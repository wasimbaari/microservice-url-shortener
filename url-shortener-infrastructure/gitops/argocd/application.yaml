
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: url-shortener
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/wasimbaari/url-shortener-gitops
    targetRevision: HEAD
    path: helm/url-shortener

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
