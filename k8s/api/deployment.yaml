apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-api
  namespace: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener-api
  template:
    metadata:
      labels:
        app: url-shortener-api
    spec:
      containers:
      - name: api
        image: 734367008253.dkr.ecr.ap-south-1.amazonaws.com/url-shortener/link:IMAGE_TAG
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgres://admin:password@postgres:5432/urlshortener
        - name: REDIS_URL
          value: redis://redis:6379