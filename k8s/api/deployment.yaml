apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-api
  namespace: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener-api
  template:
    metadata:
      labels:
        app: url-shortener-api
    spec:
      containers:
      - name: api
        image: ghcr.io/piyushsachdeva/url-shortener:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgres://admin:password@postgres:5432/urlshortener
        - name: REDIS_URL
          value: redis://redis:6379